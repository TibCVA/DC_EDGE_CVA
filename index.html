tyle:c,children:"The consensus is clear: edge is the next infrastructure frontier"}),(0,i.jsxs)("p",{style:a,children:["Every major market research firm — from MarketsandMarkets to Grand View Research, Credence to Fortune Business Insights — converges on the same directional story. The European edge datacenter market, valued between ",(0,i.jsx)("span",{style:o,children:"$3.5 and $4.0 billion in 2024"}),", is on track to grow at 18–20% annually through the end of the decade. The drivers are well-rehearsed: 5G network densification, IoT proliferation, AI inference at the network periphery, and EU data sovereignty mandates all point toward a structural shift from centralized to distributed compute."]}),(0,i.jsxs)("p",{style:a,children:["Investment activity reinforces the narrative. AtlasEdge secured ",(0,i.jsx)("span",{style:o,children:"€253 million in green financing"})," in October 2025. nLighten assembled a pan-European platform of ",(0,i.jsx)("span",{style:o,children:"35+ datacenters across 7 countries"}),". The EU approved €1.2 billion in state aid for cloud and edge computing across seven Member States. The growth story, by all appearances, is intact."]}),(0,i.jsx)(g,{value:"~18%",label:"Annual growth rate — one of the highest in European digital infrastructure"}),(0,i.jsx)(b,{text:"The directional growth story is real. But a closer look at what is actually being built — and by whom — reveals a market that is far less homogeneous than the projections suggest."}),(0,i.jsx)(k,{onClick:()=>n("Market sizing comparison across 6 analyst firms:\n\n• Credence Research: $3.28B (2024)\n• Grand View Research: $3.08B (2024)\n• Market Data Forecast: $4.04B (2024)\n• BIS Research: $5.19B (2024)\n• GMI: $4.4B (2025)\n• DC Market Insights: $4.31B (2025)\n\nDefinitions vary significantly across firms. Some include software and managed services; others infrastructure only. CAGR ranges from 18.06% (BIS Research) to 20.9% (Fortune BI) depending on scope.\n\nThe European Commission's
